<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — linkshort</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .not-found { text-align: center; }
        .not-found-code { font-size: 72px; font-weight: 500; color: var(--border); line-height: 1; }
        .not-found-title { font-size: 18px; font-weight: 500; margin: 12px 0 8px; }
        .not-found-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .not-found-link { color: var(--accent); text-decoration: none; font-size: 14px; }
        .not-found-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="not-found">
    <div class="not-found-code">404</div>
    <div class="not-found-title">Ce lien n'existe pas</div>
    <div class="not-found-sub">Il a peut-être expiré ou été supprimé.</div>
    <a href="/" class="not-found-link">Retour à l'accueil</a>
</div>
</body>
</html>
